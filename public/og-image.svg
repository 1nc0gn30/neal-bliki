<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="ogtitle ogdesc">
  <title id="ogtitle">Neal Frazier Bliki</title>
  <desc id="ogdesc">Web Systems, SEO, and Build Notes</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="wireGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285f4" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#34a853" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ea4335" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="flareGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285f4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ea4335" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="avatarGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#4285f4" flood-opacity="0.15"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4285f4" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grid)"/>

  <!-- Three.js-style wireframe ground plane (perspective) -->
  <g opacity="0.12">
    <line x1="0" y1="450" x2="1200" y2="450" stroke="#4285f4" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="480" stroke="#4285f4" stroke-width="1"/>
    <line x1="0" y1="560" x2="1200" y2="520" stroke="#4285f4" stroke-width="1"/>
    <line x1="0" y1="630" x2="1200" y2="580" stroke="#4285f4" stroke-width="1"/>
    <line x1="200" y1="450" x2="100" y2="630" stroke="#34a853" stroke-width="1"/>
    <line x1="400" y1="450" x2="300" y2="630" stroke="#34a853" stroke-width="1"/>
    <line x1="600" y1="450" x2="500" y2="630" stroke="#34a853" stroke-width="1"/>
    <line x1="800" y1="450" x2="700" y2="630" stroke="#34a853" stroke-width="1"/>
    <line x1="1000" y1="450" x2="900" y2="630" stroke="#34a853" stroke-width="1"/>
  </g>

  <!-- Floating geometric shapes (Three.js flare) -->
  <g filter="url(#glow)">
    <!-- Wireframe cube top-right -->
    <polygon points="980,100 1040,80 1060,140 1000,160" fill="none" stroke="#4285f4" stroke-width="2" opacity="0.4"/>
    <polygon points="1000,160 1060,140 1060,200 1000,220" fill="none" stroke="#4285f4" stroke-width="1.5" opacity="0.3"/>
    <line x1="980" y1="100" x2="1000" y2="160" stroke="#4285f4" stroke-width="1" opacity="0.3"/>
    <line x1="980" y1="100" x2="1000" y2="160" stroke="#4285f4" stroke-width="1" opacity="0.3"/>
    <!-- Floating triangle -->
    <polygon points="920,200 960,180 940,230" fill="none" stroke="#ea4335" stroke-width="1.5" opacity="0.35"/>
    <!-- Hexagon particle -->
    <polygon points="1080,260 1100,250 1120,260 1120,280 1100,290 1080,280" fill="none" stroke="#fbbc04" stroke-width="1" opacity="0.3"/>
    <!-- Small circuit traces -->
    <polyline points="750,80 800,80 820,110 860,110" fill="none" stroke="#4285f4" stroke-width="1.5" opacity="0.25"/>
    <circle cx="750" cy="80" r="3" fill="#4285f4" opacity="0.5"/>
    <circle cx="860" cy="110" r="3" fill="#ea4335" opacity="0.4"/>
    <!-- Floating ring -->
    <circle cx="920" cy="380" r="40" fill="none" stroke="#34a853" stroke-width="2" opacity="0.2"/>
    <circle cx="920" cy="380" r="30" fill="none" stroke="#34a853" stroke-width="1" opacity="0.15"/>
    <!-- Pixel-style dots trail -->
    <rect x="700" y="380" width="6" height="6" fill="#4285f4" opacity="0.5"/>
    <rect x="720" y="375" width="6" height="6" fill="#34a853" opacity="0.4"/>
    <rect x="740" y="385" width="6" height="6" fill="#ea4335" opacity="0.4"/>
    <rect x="760" y="378" width="6" height="6" fill="#fbbc04" opacity="0.4"/>
    <rect x="780" y="388" width="6" height="6" fill="#4285f4" opacity="0.35"/>
    <rect x="800" y="382" width="6" height="6" fill="#34a853" opacity="0.3"/>
  </g>

  <!-- Avatar image (pixel art) -->
  <g filter="url(#avatarGlow)">
    <image xlink:href="logo-neal-avatar-transparent-bg.webp" x="60" y="115" width="180" height="180" preserveAspectRatio="xMidYMid slice"/>
    <!-- Pixel frame around avatar -->
    <rect x="55" y="110" width="190" height="190" fill="none" stroke="#4285f4" stroke-width="3" rx="4" opacity="0.4"/>
    <rect x="52" y="107" width="196" height="196" fill="none" stroke="#ea4335" stroke-width="1" rx="6" opacity="0.25"/>
  </g>

  <!-- Accent line top -->
  <rect x="280" y="120" width="60" height="5" rx="2.5" fill="#4285f4"/>

  <!-- Name -->
  <text x="280" y="190" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#111111" letter-spacing="-1">Neal Frazier</text>

  <!-- Tagline -->
  <text x="280" y="250" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" fill="#4b5563">Bliki · Web Systems &amp; SEO</text>

  <!-- Divider -->
  <rect x="280" y="280" width="120" height="3" rx="1.5" fill="#e5e7eb"/>

  <!-- Description -->
  <text x="280" y="330" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="400" fill="#6b7280">Practical notes on building production websites,</text>
  <text x="280" y="370" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="400" fill="#6b7280">local SEO, and rapid shipping workflows.</text>

  <!-- URL badge -->
  <rect x="280" y="410" width="260" height="42" rx="21" fill="#111111"/>
  <text x="410" y="437" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="#ffffff" letter-spacing="0.5">nealfrazier.tech</text>

  <!-- Pixel art accent: small grid of colored squares (bottom-right) -->
  <g opacity="0.6">
    <rect x="1040" y="500" width="12" height="12" fill="#4285f4"/>
    <rect x="1060" y="500" width="12" height="12" fill="#34a853"/>
    <rect x="1080" y="500" width="12" height="12" fill="#ea4335"/>
    <rect x="1100" y="500" width="12" height="12" fill="#fbbc04"/>
    <rect x="1040" y="520" width="12" height="12" fill="#34a853"/>
    <rect x="1060" y="520" width="12" height="12" fill="#fbbc04"/>
    <rect x="1080" y="520" width="12" height="12" fill="#4285f4"/>
    <rect x="1100" y="520" width="12" height="12" fill="#ea4335"/>
    <rect x="1040" y="540" width="12" height="12" fill="#ea4335"/>
    <rect x="1060" y="540" width="12" height="12" fill="#4285f4"/>
    <rect x="1080" y="540" width="12" height="12" fill="#fbbc04"/>
    <rect x="1100" y="540" width="12" height="12" fill="#34a853"/>
  </g>
</svg>